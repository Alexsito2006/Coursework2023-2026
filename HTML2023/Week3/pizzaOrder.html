<html>
    <body> 
        <h1>Papas Pizzaria</h1>
        <hr>
        <b>What is the name for this order?<br /></b>
        <table>
            <tr>
                <td>
                    First Name:<br />
                    <input type="text" size="50%"/><br>
                </td>
                <td>
                    Last Name:<br>
                    <input type="text" size="50%"/><br>
                </td>
            </tr> 
            <tr>
                <td>
                    <b>What kind of toppings?</b><br>
                    <select id="Pizza Toppings">
                        <option value="Cheese">Cheese</option>
                        <option value="Pepperoni">Pepperoni</option>
                        <option value="Sausage">Sausage</option>
                        <option value="Bacon">Bacon</option>
                        <option value="Pineapple(Best kind of pizza.)">Pineapple</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <b>What type of crust would you like?</b><br>
                    <select id="Crust type">
                        <option value="Thin">Thin</option>
                        <option value="Stuffed Cheese">Stuffed Cheese</option>
                        <option value="Garlic">Garlic</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>
                    <b>How much cheese: </b>
                    <input type="range">
                </td>
            </tr>
        </table>

        <b>Special Instrucitons:</b><br>
        <textarea id="Instrucitons" name="Instructions">

        </textarea><br>
        <input type="button" value="Submit order"/>
    </body>
</html>
